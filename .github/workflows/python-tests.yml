name: CI - Run server tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mopr2005
          MYSQL_DATABASE: itsm
        ports:
          - 3306:3306
        options: >-
          --health-cmd='mysqladmin ping --silent'
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for MySQL service
        run: sleep 15

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -pmopr2005 < server/db_init.sql

      - name: Install server dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r server/requirements.txt

      - name: Start Flask server
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: mopr2005
          DB_NAME: itsm
          PORT: 5000
        run: |
          . .venv/bin/activate
          nohup python server/app.py > server.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5000/api/ping >/dev/null; then
              echo 'server up' && break
            fi
            sleep 1
          done
          tail -n +1 server.log || true

      - name: Run tests
        run: |
          . .venv/bin/activate
          pip install pytest requests
          pytest -q

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
